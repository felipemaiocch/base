<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente Corporativo</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html, body { height: 100%; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .app-shell { height: 100vh; height: 100dvh; }
    .markdown-body p { margin-bottom: 0.75em; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
    .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
    .markdown-body pre { background: #f1f5f9; padding: 0.75em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 0.75em; }
    .markdown-body code { background: #f1f5f9; padding: 0.1em 0.3em; border-radius: 0.25em; }
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-right: 4px;
      background: #94a3b8;
      border-radius: 999px;
      animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body class="overflow-hidden bg-slate-100 text-slate-900">
  <div class="app-shell flex min-h-0 flex-col">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex w-full max-w-5xl items-center gap-3 px-4 py-4">
        <div class="flex h-11 w-11 items-center justify-center rounded-full bg-blue-100 text-blue-600">
          <i class="fa-solid fa-robot text-xl"></i>
        </div>
        <div>
          <h1 class="text-lg font-semibold">Assistente da Equipe</h1>
          <p class="text-sm text-slate-500">Chat interno para SAC, operacao e vendas</p>
        </div>
      </div>
    </header>

    <main class="mx-auto flex w-full max-w-5xl min-h-0 flex-1 flex-col px-4 py-6">
      <section class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
        <div id="chat-container" class="flex min-h-0 flex-1 flex-col gap-4 overflow-y-auto p-4 md:p-6">
          <div class="flex max-w-[88%] flex-col self-start md:max-w-[70%]">
            <span class="mb-1 ml-2 text-xs text-slate-500">Assistente</span>
            <div class="markdown-body rounded-2xl rounded-tl-sm border border-slate-100 bg-slate-50 p-4 text-sm text-slate-800 shadow-sm">
              Ola! Estou pronto para responder usando a base de conhecimento configurada pelo administrador. Como posso ajudar?
            </div>
          </div>
        </div>

        <div id="typing-indicator" class="hidden px-6 pb-2">
          <div class="inline-block rounded-2xl rounded-tl-sm border border-slate-100 bg-white px-4 py-3 shadow-sm">
            <div class="typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <div id="system-alert" class="hidden px-4 pb-2 md:px-6">
          <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-700"></div>
        </div>

        <div class="border-t border-slate-200 bg-white p-3 md:p-4">
          <form id="chat-form" class="mx-auto flex max-w-4xl items-end gap-2">
            <textarea id="user-input" rows="1" class="max-h-40 w-full resize-none overflow-y-auto rounded-2xl border border-transparent bg-slate-100 px-4 py-3 transition focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200" placeholder="Digite sua duvida aqui... (Shift+Enter para quebrar linha)"></textarea>
            <button id="send-btn" type="submit" class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-blue-600 text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');
    const sendBtn = document.getElementById('send-btn');
    const systemAlert = document.getElementById('system-alert');
    const systemAlertContent = systemAlert.querySelector('div');

    let messageHistory = [];

    function escapeHTML(text) {
      return text.replace(/[&<>'"]/g, (tag) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[tag]));
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
      typingIndicator.classList.remove('hidden');
      sendBtn.disabled = true;
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.add('hidden');
      sendBtn.disabled = false;
    }

    function showSystemAlert(message) {
      systemAlertContent.textContent = message;
      systemAlert.classList.remove('hidden');
    }

    function clearSystemAlert() {
      systemAlert.classList.add('hidden');
      systemAlertContent.textContent = '';
    }

    function appendMessage(sender, text) {
      const wrapper = document.createElement('div');

      if (sender === 'user') {
        wrapper.className = 'flex max-w-[88%] flex-col self-end md:max-w-[70%]';
        wrapper.innerHTML = `
          <span class="mb-1 mr-2 self-end text-xs text-slate-500">Voce</span>
          <div class="rounded-2xl rounded-tr-sm bg-blue-600 p-4 text-sm text-white shadow-sm whitespace-pre-wrap">${escapeHTML(text)}</div>
        `;
      } else {
        const formatted = DOMPurify.sanitize(marked.parse(text));
        wrapper.className = 'flex max-w-[88%] flex-col self-start md:max-w-[70%]';
        wrapper.innerHTML = `
          <span class="mb-1 ml-2 text-xs text-slate-500">Assistente</span>
          <div class="markdown-body rounded-2xl rounded-tl-sm border border-slate-100 bg-slate-50 p-4 text-sm text-slate-800 shadow-sm">${formatted}</div>
        `;
      }

      chatContainer.appendChild(wrapper);
      scrollToBottom();
    }

    userInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = `${this.scrollHeight}px`;
      if (this.value === '') {
        this.style.height = 'auto';
      }
    });

    userInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        chatForm.dispatchEvent(new Event('submit'));
      }
    });

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const text = userInput.value.trim();
      if (!text) {
        return;
      }

      clearSystemAlert();
      userInput.value = '';
      userInput.style.height = 'auto';
      appendMessage('user', text);
      showTyping();

      const historySnapshot = [...messageHistory];

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: text,
            history: historySnapshot
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Falha ao consultar o assistente.');
        }

        messageHistory = [
          ...historySnapshot,
          { role: 'user', content: text },
          { role: 'assistant', content: data.reply }
        ].slice(-10);

        appendMessage('assistant', data.reply);
      } catch (error) {
        showSystemAlert(error.message || 'Falha ao consultar o assistente.');
      } finally {
        hideTyping();
      }
    });
  </script>
</body>
</html>
