<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Assistente Corporativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-50">
  <main class="mx-auto flex min-h-screen max-w-5xl items-center justify-center px-4">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl backdrop-blur">
      <p class="mb-3 text-sm uppercase tracking-[0.25em] text-blue-300">Painel restrito</p>
      <h1 class="mb-2 text-3xl font-semibold">Entrar no admin</h1>
      <p class="mb-6 text-sm text-slate-300">Somente quem tiver a senha do painel consegue editar a base de conhecimento.</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="password" class="mb-2 block text-sm text-slate-200">Senha do painel</label>
          <input id="password" type="password" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-4 py-3 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20" placeholder="Digite a senha">
        </div>

        <button type="submit" class="w-full rounded-2xl bg-blue-500 px-4 py-3 font-medium text-white transition hover:bg-blue-400">
          Entrar
        </button>
      </form>

      <p id="error-message" class="mt-4 hidden rounded-2xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-sm text-red-200"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorMessage.classList.add('hidden');
      errorMessage.textContent = '';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            password: passwordInput.value
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Nao foi possivel autenticar.');
        }

        window.location.href = '/admin';
      } catch (error) {
        errorMessage.textContent = error.message || 'Nao foi possivel autenticar.';
        errorMessage.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
